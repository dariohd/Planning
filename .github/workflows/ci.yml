name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run test

      - name: Build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
          AUTH_SECRET: ci-test-secret-minimum-32-chars-long
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: E2E tests
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
          AUTH_SECRET: ci-test-secret-minimum-32-chars-long
        run: npm run test:e2e
